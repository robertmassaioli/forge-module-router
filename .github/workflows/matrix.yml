name: Version Matrix

on:
  pull_request:
  schedule:
    # Weekly on Monday at 06:00 UTC — catches upstream peer dep breakages
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      combinations:
        description: 'Comma-separated combination IDs to run (e.g. M1,M2,M6). Leave blank for all.'
        required: false
        default: ''

jobs:
  matrix:
    name: Peer dependency version matrix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run version matrix
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.combinations }}" ]; then
            ARGS="--combinations=${{ github.event.inputs.combinations }}"
          fi
          npx tsx test-matrix/runner/run-matrix.ts $ARGS

      - name: Upload matrix logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-logs
          path: test-matrix/results/
          retention-days: 7
